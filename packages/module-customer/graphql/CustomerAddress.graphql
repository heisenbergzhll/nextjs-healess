query CustomerQuery {
  customer {
    email
    addresses {
      id
      default_billing
      default_shipping
      city
      company
      firstname
      lastname
      telephone
      postcode
      country_code
      extension_attributes {
        attribute_code
        value
      }
      region {
        region_id
        region
      }
      street
      telephone
    }
  }
}
